name: Build Ubuntu Wheels

on:
  workflow_call:
    outputs:
      run_id:
        description: "Run ID of the build workflow"
        value: ${{ jobs.post-build.outputs.run_id }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    name: Build Ubuntu Wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            libasio-dev \
            libtinyxml2-dev \
            libssl-dev \
            swig \
            patchelf

      - name: Create virtual environment
        run: |
          python -m venv build_venv
          source build_venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools

      - name: Install FastDDS v3, Generate Python types, and Build wheel
        run: |
          source build_venv/bin/activate
          bash scripts/install_fastdds_v3_colcon.sh
          export PATH="/opt/fast-dds-gen-v3/bin:$PATH"
          export FASTDDSGEN_BIN="/opt/fast-dds-gen-v3/bin/fastddsgen"
          export PREFIX_V3="/opt/fast-dds-v3"
          export CMAKE_PREFIX_PATH="/opt/fast-dds-v3:${CMAKE_PREFIX_PATH:-}"
          export LD_LIBRARY_PATH="/opt/fast-dds-v3/lib:/opt/fast-dds-v3/lib64:${LD_LIBRARY_PATH:-}"
          export PYTHONPATH="/opt/fast-dds-v3/lib/python$(python -c 'import sys;print("{}.{}".format(*sys.version_info[:2]))')/site-packages:${PYTHONPATH:-}"
          cd scripts && bash gen_python_types.sh
          cd ..
          rm -rf dist/
          bash scripts/make_pip_package_with_runtime.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-ubuntu-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30

  post-build:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      run_id: ${{ steps.run_id.outputs.run_id }}
    steps:
      - name: Download all Ubuntu wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-ubuntu-*
          path: all-wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -la all-wheels/

      - name: Upload wheels to Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="latest"
          fi
          echo "Release tag: $TAG"

          # Delete and recreate the release for a clean state
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Deleting existing release $TAG ..."
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag=false
          fi

          if [ "$TAG" = "latest" ]; then
            echo "Creating pre-release $TAG ..."
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Latest Build (Ubuntu)" --prerelease \
              --notes "Automated build from \`main\` branch ($(date -u +%Y-%m-%d %H:%M UTC))"
          else
            echo "Creating release $TAG ..."
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --generate-notes
          fi

          # Upload wheels
          echo "Uploading Ubuntu wheels ..."
          gh release upload "$TAG" all-wheels/*.whl \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Export run id
        id: run_id
        run: |
          echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
