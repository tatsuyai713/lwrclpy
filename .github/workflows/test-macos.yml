name: Test macOS Wheels

on:
  workflow_call:
    inputs:
      build_run_id:
        description: "Run ID of the build workflow to fetch artifacts from"
        required: true
        type: string

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    name: Test macOS (Python ${{ matrix.python-version }})
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-macos-py${{ matrix.python-version }}
          path: downloaded-wheel/
          merge-multiple: false
          run-id: ${{ inputs.build_run_id }}
          repository: ${{ github.repository }}

      - name: Install wheel
        run: |
          python -m venv test_venv
          source test_venv/bin/activate
          pip install --upgrade pip
          echo "Available wheels:"
          ls -la downloaded-wheel/
          PYVER=$(python -c 'import sys; print("".join(map(str, sys.version_info[:2])))')
          pip install downloaded-wheel/lwrclpy-*-cp${PYVER}-cp${PYVER}-macosx_15_*.whl

      - name: Run tests
        run: |
          set -x
          source test_venv/bin/activate
          python -u test/test_examples_mac.py 2>&1 | tee test_output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Test exit code: $TEST_EXIT_CODE"
          exit $TEST_EXIT_CODE
