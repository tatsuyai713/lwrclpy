name: Build & Test macOS

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS Wheel (Python ${{ matrix.python-version }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: ./.github/actions/build-macos
        with:
          python-version: ${{ matrix.python-version }}

  test:
    name: Test macOS Python ${{ matrix.python-version }}
    runs-on: macos-15
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: ./.github/actions/test-macos
        with:
          python-version: ${{ matrix.python-version }}
