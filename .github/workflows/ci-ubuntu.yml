name: Build & Test Ubuntu

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-test-ubuntu-wheels:
    name: Build Ubuntu Wheel (Python 3.12)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            libasio-dev \
            libtinyxml2-dev \
            libssl-dev \
            swig \
            patchelf

      - name: Create virtual environment
        run: |
          python -m venv build_venv
          source build_venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools

      - name: Install FastDDS v3, Generate Python types, and Build wheel
        run: |
          source build_venv/bin/activate
          bash scripts/install_fastdds_v3_colcon.sh
          export PATH="/opt/fast-dds-gen-v3/bin:$PATH"
          export FASTDDSGEN_BIN="/opt/fast-dds-gen-v3/bin/fastddsgen"
          export PREFIX_V3="/opt/fast-dds-v3"
          export CMAKE_PREFIX_PATH="/opt/fast-dds-v3:${CMAKE_PREFIX_PATH:-}"
          export LD_LIBRARY_PATH="/opt/fast-dds-v3/lib:/opt/fast-dds-v3/lib64:${LD_LIBRARY_PATH:-}"
          export PYTHONPATH="/opt/fast-dds-v3/lib/python$(python -c 'import sys;print("{}.{}".format(*sys.version_info[:2]))')/site-packages:${PYTHONPATH:-}"
          cd scripts && bash gen_python_types.sh
          cd ..
          rm -rf dist/
          bash scripts/make_pip_package_with_runtime.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-ubuntu-py3.12
          path: dist/*.whl
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-ubuntu-wheels:
    name: Test Ubuntu Examples (Python 3.12)
    runs-on: ubuntu-22.04
    needs: build-test-ubuntu-wheels
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-ubuntu-py3.12
          path: downloaded-wheel/
          merge-multiple: false

      - name: Install wheel
        run: |
          python -m venv test_venv
          source test_venv/bin/activate
          pip install --upgrade pip
          echo "Available wheels:"
          ls -la downloaded-wheel/
          PYVER=$(python -c 'import sys; print("".join(map(str, sys.version_info[:2])))')
          WHEEL_FILE=$(ls downloaded-wheel/lwrclpy-*-cp${PYVER}-cp${PYVER}-linux_x86_64.whl 2>/dev/null | head -n1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "Error: No matching wheel found for Python ${PYVER} linux_x86_64"
            exit 1
          fi
          pip install "$WHEEL_FILE"

      - name: Run tests
        run: |
          set -x
          source test_venv/bin/activate
          python -u test/test_examples_ubuntu.py 2>&1 | tee test_output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Test exit code: $TEST_EXIT_CODE"
          exit $TEST_EXIT_CODE
