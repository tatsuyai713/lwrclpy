name: Build & Test Ubuntu

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Ubuntu Wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
      - uses: ./.github/actions/build-ubuntu
        with:
          python-version: ${{ matrix.python-version }}

  test:
    name: Test Ubuntu Examples (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
      - uses: ./.github/actions/test-ubuntu
        with:
          python-version: ${{ matrix.python-version }}
